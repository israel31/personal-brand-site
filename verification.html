<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Verify Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-100">

<div class="bg-white p-6 rounded-lg shadow w-full max-w-md">
  <h1 class="text-2xl font-bold mb-4">Payment Verification</h1>

  <input
    id="email"
    type="email"
    placeholder="Enter your payment email"
    class="w-full border p-3 rounded mb-4"
  />

  <button
    onclick="verify()"
    class="w-full bg-blue-600 text-white p-3 rounded"
  >
    Verify
  </button>

  <p id="msg" class="mt-4 text-center text-sm"></p>

  <a
    id="wa"
    href="https://chat.whatsapp.com/KyiF7p9ZvDpB0Feu5tFVlP"
    target="_blank"
    class="hidden mt-6 block text-center bg-green-600 text-white p-3 rounded"
  >
    Join WhatsApp Group
  </a>
</div>

<script>
async function verify() {
  const email = document.getElementById("email").value.trim();
  const msg = document.getElementById("msg");
  const wa = document.getElementById("wa");

  wa.classList.add("hidden");
  msg.textContent = "Checking payment...";

  if (!email) {
    msg.textContent = "Enter a valid email";
    return;
  }

  try {
    const res = await fetch("/.netlify/functions/verify-payment", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email }),
    });

    const data = await res.json();

    if (data.paid) {
      msg.textContent = "Payment verified ✅";
      wa.classList.remove("hidden");
    } else {
      msg.textContent = "No successful payment found ❌";
    }
  } catch {
    msg.textContent = "Verification failed";
  }
}
</script>

</body>
</html>
