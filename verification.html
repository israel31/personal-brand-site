<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Verification</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-100">

<div class="bg-white p-6 rounded-lg shadow w-full max-w-md">
  <h2 class="text-2xl font-bold mb-4">Verify Payment</h2>

  <input
    id="email"
    type="email"
    placeholder="Enter your email"
    class="w-full border p-3 rounded mb-4"
  />

  <button
    onclick="verifyPayment()"
    class="w-full bg-blue-600 text-white p-3 rounded"
  >
    Verify
  </button>

  <p id="message" class="mt-4 text-center text-sm"></p>

  <a
    id="whatsapp"
    href="https://chat.whatsapp.com/YOUR_GROUP_LINK"
    target="_blank"
    class="hidden mt-6 block text-center bg-green-600 text-white p-3 rounded"
  >
    Join WhatsApp Group
  </a>
</div>

<script>
async function verifyPayment() {
  const email = document.getElementById("email").value.trim();
  const message = document.getElementById("message");
  const whatsapp = document.getElementById("whatsapp");

  whatsapp.classList.add("hidden");
  message.textContent = "Checking payment...";

  if (!email) {
    message.textContent = "Enter a valid email";
    return;
  }

  try {
    const res = await fetch("/.netlify/functions/verify-payment", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (data.paid) {
      message.textContent = "Payment verified ✅";
      whatsapp.classList.remove("hidden");
    } else {
      message.textContent = "No successful payment found ❌";
    }
  } catch (err) {
    message.textContent = "Verification failed";
  }
}
</script>

</body>
</html>
